# https://render.com/docs/blueprint-spec
# Single web service: API + React UI (build.sh builds frontend into backend/static).
# Manual: Build = bash build.sh | Start = bash start.sh | PYTHON_VERSION = 3.11.9
services:
  - type: web
    name: face-swap-api
    runtime: python
    buildCommand: bash build.sh
    startCommand: bash start.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: FACEFUSION_PYTHON
        value: python
      - key: WEB_CONCURRENCY
        value: "1"
      - key: FACEFUSION_EXECUTION_PROVIDERS
        value: cpu
      - key: FACEFUSION_PROCESSORS
        value: face_swapper
      - key: FACEFUSION_SWAP_MODEL
        value: inswapper_128_fp16
      - key: FACEFUSION_PIXEL_BOOST
        value: 128x128
      - key: SWAP_MAX_EDGE
        value: "1024"
      - key: OMP_NUM_THREADS
        value: "1"
      - key: ORT_NUM_THREADS
        value: "1"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
