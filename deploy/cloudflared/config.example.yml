# Cloudflare Tunnel — permanent URL for your home PC server.
#
# Setup (one time):
#   1. Add your domain to Cloudflare (free plan is fine).
#   2. Install cloudflared: https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/downloads/
#   3. cloudflared tunnel login
#   4. cloudflared tunnel create face-swap
#   5. Copy this file to config.yml and set tunnel id + hostname.
#   6. cloudflared tunnel route dns face-swap faceswap.yourdomain.com
#   7. cloudflared tunnel run face-swap  (or use start-remote-windows.bat)
#
# Docs: https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/

tunnel: YOUR_TUNNEL_ID
credentials-file: C:\Users\YOUR_USER\.cloudflared\YOUR_TUNNEL_ID.json

ingress:
  - hostname: faceswap.yourdomain.com
    service: http://127.0.0.1:8000
  - service: http_status:404
