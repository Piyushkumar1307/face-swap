# Permanent Cloudflare Tunnel — copy to config.yml and edit, OR run:
#   bash deploy/setup-permanent-tunnel-mac.sh   (Mac, recommended)
#
# Prerequisites:
#   1. Domain on Cloudflare (nameservers pointed to Cloudflare).
#   2. brew install cloudflared
#   3. cloudflared tunnel login
#   4. cloudflared tunnel create face-swap
#   5. cloudflared tunnel route dns face-swap faceswap.yourdomain.com
#   6. bash deploy/start-permanent-mac.sh
#
# Docs: https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/

tunnel: YOUR_TUNNEL_UUID
credentials-file: /Users/YOUR_USER/.cloudflared/YOUR_TUNNEL_UUID.json

ingress:
  - hostname: faceswap.yourdomain.com
    service: http://127.0.0.1:8000
  - service: http_status:404
