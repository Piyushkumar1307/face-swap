# Nginx site for face-swap-app (Linux).
# Install: sudo cp deploy/nginx/face-swap.conf /etc/nginx/sites-available/face-swap
#          sudo ln -sf /etc/nginx/sites-available/face-swap /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# Replace YOUR_PC_IP or use a domain in server_name.

upstream face_swap_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    # listen 443 ssl http2;  # uncomment after certbot / your certs
    server_name YOUR_PC_IP_OR_DOMAIN;

    # Large camera photos
    client_max_body_size 20M;

    # FaceFusion swap can take several minutes on CPU
    proxy_read_timeout 600s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 600s;

    location / {
        proxy_pass http://face_swap_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
